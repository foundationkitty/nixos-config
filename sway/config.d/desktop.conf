# Set Win key as Modifier
set $mod Mod4

# Font for window titles. Will also be used by the bar.
font pango:monospace 11

# HDR

output DP-2 render_bit_depth 10 hdr on

# wlsunset

exec_always wlsunset -t 4200 -T 6500 -S 6:30 -s 18:30 -g 1.2

# start a terminal
bindsym $mod+Return exec foot --font 'Monospace'

# Start i3bar to display a workspace bar (plus the system information i3status
# finds out, if available)
bar {
        status_command i3status -c ~/.config/sway/desktop.status
}

include ~/.config/sway/main.conf
